services:
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    profiles:
      - serg-sync
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: "serg-sync"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d serg-sync"]
      interval: 10s
      timeout: 5s
      retries: 5